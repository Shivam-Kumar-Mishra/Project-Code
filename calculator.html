    <style>
        *{
    margin: 0;
    padding: 0;
}
body{
    font: bold;
    display: flex;
    text-align: center;
    justify-content: center;
    font-family: sans-serif;
    background: url(Screenshot\ \(9\).png);
    background-size: cover;
    background-attachment: fixed;
    background-repeat: no-repeat;
}
.container{
    margin: 200px auto;
    width: 400px;
    height: 400px;
    border: 2px solid rgba(0,0,0,0.2);
    background: rgba(0,0,0,0.3);
    box-shadow: -1px 2px 10px 2px;
    border-radius: 20px;
}
.box{
    margin: 60px auto;
}
input{
    width: 300px;
    height: 40px;
    margin: 10px auto;
    background: rgba(0,0,0,0.2);
    border: 2px solid rgba(0,0,0,0.3); 
    box-shadow: -1px 2px 10px 2px;
    border-radius: 10px;  
}
input:hover{
    background: rgba(0,0,0,0.7);
    color: blue;
    border: 2px solid rgba(0,0,0,0.3); 
    border-radius: 10px; 
    transform: translateY(-10%);
    transition: 1s;

}
input::placeholder{
    padding: 20px;
    color: rgb(244,144,125);
    font-family: sans-serif;
}
button{
    width: 80px;
    height: 40px;
    color: blue;
    font-weight: 600;
    background: rgba(255,255,255,0.7);
    border: 2px solid rgba(0,0,0,0.3); 
    border-radius: 10px;
}
button:hover{
    cursor: pointer;
    color: white;
    background: orangered;
    box-shadow: -1px 2px 10px 2px;
    transition: .8s;
}

    </style>
<div class="calculator">       
        <input type="text" placeholder="0" class ="box" readonly>
    <div>
        <button class ="btn a" id="ac">AC</button>
        <button class ="btn a" id="del">DEL</button>
        <button class ="btn a" id="per">%</button>
        <button class ="btn a" id="slace">/</button>
    </div>
    <div>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class ="btn a">*</button>
    </div>
    <div>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class ="btn a">-</button>
    </div>
    <div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class ="btn a">+</button>
    </div>
    <div>
        <button class ="btn">00</button>
        <button class ="btn">0</button>
        <button class ="btn">.</button>
        <button class ="btn b">=</button>
    </div>
</div>
