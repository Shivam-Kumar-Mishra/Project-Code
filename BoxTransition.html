    <style>
        *{
    margin: 0;
    padding: 0;
}
body{
    width: 100vw;

.btn{
    border-radius: 10px;
    background-color: orangered;
    margin: 60px;
    width: 80px;
    height: 80px;
    border: 2px solid green;
    position: relative;
    top: 10px;
    left: 10px;
    animation-name: moving;
    animation-duration: 1s;
    animation-timing-function: ease-in-out;
    animation-delay: 1s;
    animation-iteration-count: infinite;
    animation-direction: alternate-reverse;
}
