<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <style>
        *{            
            box-sizing: border-box;
        }
        body,html{
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100%;
            background-color: rgb(144, 222, 214);
        }
        @media screen and (min-width:1600px) {
        .form{ 
            display: grid;
            row-gap: 5px;
            grid-template-columns: 1fr 1fr  1fr 1fr;
          }
          h1{
            color: rgb(0, 8, 255);
            display: grid;
            grid-template-columns: 1fr;
            grid-column: 1/5;
            text-align: center;
            margin-top: 0;
            }
        }        
        @media screen and (max-width:1600px) {
        .form{ 
            display: grid;
            row-gap: 5px;
            grid-template-columns: repeat(4,1fr);
          }
          h1{
            color: rgb(0, 8, 111);
            display: grid;
            grid-template-columns: 1fr;
            grid-column: 1/5;
            text-align: center;
            margin: 0;
            }
        }
        @media only screen and (max-width: 1384px) {
        .form{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            }
        h1{
            color: rgb(4, 6, 47);
            display: grid;
            grid-template-columns: 1fr;
            grid-column: 1/4;
            text-align: center;
            margin: 0;
          }
        }
        @media only screen and (max-width: 1040px) {
        .form{
            display:grid;
            grid-template-columns: repeat(2,1fr);
            }
            h1{
            color: rgb(0, 8, 255);
            display: grid;
            grid-template-columns: 1fr ;
            grid-column: 1/3;
            text-align: center;
            margin: 0;
            } 
        }
        @media only screen and (max-width: 700px) {
        .form{
            display: flex;
            flex-direction: column;            
            }
            h1{
            margin: 0;
            color:#e82;
            text-align: center;
            }         
        }          
        #t1,#t2,#t3,#t4,#t5,#t8,#t9,.Gender,.btn,.img{
            width: 300px;
            height:45px;
            border: none;
            border-radius: 8px;
            padding: 5px;
            background-color: #fff;
        }
        .btn:hover{
            color: white;
            background-color: brown;
        }
        input:hover{
            box-shadow: 0px 2px 10px black;
        }
        .form{
            row-gap: 30px;
            column-gap: 40px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px black;
            transition: 0.5s;
            }
    </style>

<form  class="form" action="five.html" onsubmit="return data()">
       <h1>Registration Form</h1>
     <input type="text" id="t1" placeholder="Enter your Name">
     <input type="text" id="t5" placeholder="Enter your Email">
     <input type="text" id="t8" placeholder="Enter your Father Name">
     <input type="text" id="t9" placeholder="Enter your Address">   
     <input type="text"  id="t2" placeholder="Enter your mobile Number">    
     <input type="password" id="t3" placeholder="Enter your Password">
     <input type="password" id="t4" placeholder="Enter your Confirm Password">
     <span class="Gender" for="text"><b>Gender :</b>
     <span for="Gender">Male<input type="checkbox" id="t6" ></span>
     <span for="Gender">Female<input type="checkbox" id="t7"></span></span>   
     <span class="img">Image :<input type="file"></input></span> 
     <button class="btn">Submit</button>
    </form>
    <script>
        function data(){

        let t1 = document.querySelector("#t1").value;
        let t2 = document.querySelector("#t2").value;
        let t3 = document.querySelector("#t3").value;
        let t4 = document.querySelector("#t4").value;

        if(t1 == "" || t2 == "" || t3 == "" || t4 == ""){
            alert("all field are mandatory");
            return false;
        }
        else if(t2.length>10 || t2.length<10){
            alert('please enter valid number');
            return false;
        }
        else if (t3 != t4){
            alert('please enter same password')
            return false;
        }
        else{
        true;
        }
    }
    </script>
</body>
</html>
